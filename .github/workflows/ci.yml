name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats + shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats shellcheck

      - name: Setup Node (for inline JSON parsing in scripts)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: shellcheck all .sh files
        run: |
          shellcheck -S warning scripts/*.sh

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run bats tests
        run: bats tests/

      - name: Run scripts smoke-check (statusline + gain print output)
        run: |
          echo '{}' | bash scripts/tokenwar-statusline.sh
          bash scripts/gain.sh || true
          bash scripts/status.sh || true
